name: CI of Vernier

on:
  push:
    branches:
      - main  # Set a branch name to trigger deployment
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        build-type: [Debug]
        compiler: [gcc]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Install dependencies Linux 
      uses: jrl-umi3218/github-actions/install-dependencies@master
      with:
        compiler: ${{ matrix.compiler }}
        build-type: ${{ matrix.build-type }}
        ubuntu: |
          apt: cmake libeigen3-dev libgtest-dev wget unzip libqhull-dev libopencv-dev doxygen doxygen-latex  libvisp-dev libvisp-doc visp-images-data
        macos: |
          brew: autoconf automake cmake eigen libtool libmatio opencv fftw
    
    - name: Build and test
      uses: jrl-umi3218/github-actions/build-cmake-project@master
      with:
        compiler: ${{ matrix.compiler }}
        build-type: ${{ matrix.build-type }}
  
    - name: build doc
      run: |
        ls
        cd ./build
        make html-doc

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/html